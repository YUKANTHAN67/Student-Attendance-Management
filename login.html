<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Attendify</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        },
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            text: '#f8fafc',
                            muted: '#94a3b8'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS Base -->
    <link rel="stylesheet" href="css/styles.css?v=4">
    <style type="text/tailwindcss">
        @layer components {
            .btn-primary { @apply bg-primary-600 hover:bg-primary-500 text-white font-semibold py-2 px-5 rounded-full transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center gap-2; }
            html.dark .btn-primary { @apply bg-teal-500 text-slate-900 hover:bg-teal-600; }
            
            .btn-secondary { @apply bg-gray-800 hover:bg-gray-700 text-white font-semibold py-2 px-5 rounded-full transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center gap-2; }
            html.dark .btn-secondary { @apply bg-slate-700 hover:bg-slate-600; }
            
            .btn-success { @apply bg-green-600 hover:bg-green-500 text-white font-semibold py-2 px-5 rounded-full transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center gap-2; }
            .btn-danger { @apply bg-red-600 hover:bg-red-500 text-white font-semibold py-2 px-5 rounded-full transition-all duration-300 shadow-md hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center gap-2; }
            .btn-outline { @apply border border-gray-300 hover:border-gray-400 dark:border-gray-600 dark:hover:border-gray-500 text-gray-700 dark:text-gray-300 font-semibold py-2 px-5 rounded-full transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center gap-2; }
            
            .toast-success { @apply bg-green-100 text-green-800 border border-green-200 dark:bg-green-900/80 dark:text-green-200 dark:border-green-800; }
            .toast-error { @apply bg-red-100 text-red-800 border border-red-200 dark:bg-red-900/80 dark:text-red-200 dark:border-red-800; }
            .toast-warning { @apply bg-yellow-100 text-yellow-800 border border-yellow-200 dark:bg-yellow-900/80 dark:text-yellow-200 dark:border-yellow-800; }
        }
    </style>
    <style>
        .split-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        html.dark .glass-panel {
            background: rgba(30, 41, 59, 0.95);
        }
        .role-tab.active {
            border-bottom: 2px solid #0d9488;
            color: #0d9488;
        }
        html.dark .role-tab.active {
            border-bottom: 2px solid #14b8a6;
            color: #14b8a6;
        }
        
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(to right, #14b8a6, #3b82f6);
            filter: blur(60px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out alternate;
        }
        
        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-bg text-gray-800 dark:text-dark-text transition-colors duration-300 font-sans antialiased min-h-screen flex">
    
    <!-- Left Pattern/Branding Side -->
    <div class="hidden lg:flex w-1/2 split-bg relative overflow-hidden items-center justify-center">
        <!-- Decorative Shapes -->
        <div class="floating-shape w-96 h-96 top-20 left-10"></div>
        <div class="floating-shape w-64 h-64 bottom-20 right-10" style="animation-delay: -5s; background: linear-gradient(to right, #8b5cf6, #14b8a6);"></div>
        
        <div class="z-10 text-center px-12">
            <div class="w-32 h-32 mx-auto bg-white/10 rounded-2xl backdrop-blur-md flex items-center justify-center mb-8 border border-white/20 p-2">
                <img src="logo.png" alt="P.S.R Logo" class="w-full h-full object-contain drop-shadow-lg">
            </div>
            <h1 class="text-4xl font-bold text-white mb-4 tracking-tight">P.S.R Engineering College</h1>
            <p class="text-xl text-gray-300 font-light max-w-md mx-auto leading-relaxed">
                Student Attendance Management System
            </p>
        </div>
    </div>

    <!-- Right Login Side -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 relative">
        <!-- Mobile Background Pattern -->
        <div class="absolute inset-0 z-0 lg:hidden opacity-20 pointer-events-none">
            <div class="floating-shape w-full h-96 top-0 left-0 bg-primary-500"></div>
        </div>

        <!-- Login Card -->
        <div class="w-full max-w-md glass-panel rounded-3xl p-8 sm:p-10 shadow-2xl relative z-10 border border-gray-100 dark:border-gray-800">
            
            <!-- Mobile Logo -->
            <div class="flex flex-col lg:hidden items-center justify-center gap-2 mb-8 text-primary-600 dark:text-primary-500">
                <img src="logo.png" alt="P.S.R Logo" class="h-16 w-auto object-contain">
                <h1 class="text-xl font-bold tracking-tight text-center">P.S.R Engineering College</h1>
            </div>

            <div class="mb-8">
                <h2 class="text-3xl font-bold mb-2">Welcome back</h2>
                <p class="text-gray-500 dark:text-gray-400">Please enter your details to sign in.</p>
            </div>

            <!-- Role Selection Tabs -->
            <div class="flex border-b border-gray-200 dark:border-gray-700 mb-8">
                <button type="button" onclick="setRole('staff')" id="tab-staff" class="role-tab active flex-1 py-3 text-sm font-semibold text-center text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
                    Staff Member
                </button>
                <button type="button" onclick="setRole('hod')" id="tab-hod" class="role-tab flex-1 py-3 text-sm font-semibold text-center text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
                    HOD
                </button>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Email or Username</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="username" required placeholder="Enter your username" class="w-full pl-11 pr-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-shadow">
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Password</label>
                        <a href="#" class="text-xs text-primary-600 dark:text-primary-400 hover:underline font-medium">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-12 py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-gray-50 dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-shadow">
                        <button type="button" id="togglePassword" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500 dark:focus:ring-primary-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                    <label for="remember" class="ml-2 text-sm font-medium text-gray-600 dark:text-gray-400">Remember me for 30 days</label>
                </div>

                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-primary-500/30 flex items-center justify-center gap-2 group">
                    Sign In
                    <i class="fa-solid fa-arrow-right transform group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Use <strong class="text-gray-800 dark:text-gray-200">admin</strong> / <strong class="text-gray-800 dark:text-gray-200">admin123</strong> to login. <br/>
                    <span id="roleHint" class="font-medium text-primary-600 dark:text-primary-400 mt-1 block">You are logging in as Staff.</span>
                </p>
            </div>
        </div>

        <!-- Theme Toggle absolute positioning -->
        <button id="themeToggle" class="absolute top-6 right-6 w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-dark-card/50 backdrop-blur flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-dark-card shadow-sm transition-all z-20">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-xl shadow-lg font-medium">
        <i id="toastIcon" class="fa-solid"></i>
        <span id="toastMsg"></span>
    </div>

    <script>
        let currentRole = 'staff';

        // Theme Initialization
        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const toggleIcon = themeToggle.querySelector('i');
            
            const isDark = localStorage.getItem('theme') === 'dark' || 
                          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
                toggleIcon.className = 'fa-solid fa-sun text-yellow-500';
            } else {
                document.documentElement.classList.remove('dark');
                toggleIcon.className = 'fa-solid fa-moon text-gray-700';
            }

            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isNowDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isNowDark ? 'dark' : 'light');
                toggleIcon.className = isNowDark ? 'fa-solid fa-sun text-yellow-500' : 'fa-solid fa-moon text-gray-700';
            });
        }

        // Role switching
        function setRole(role) {
            currentRole = role;
            
            const tabStaff = document.getElementById('tab-staff');
            const tabHod = document.getElementById('tab-hod');
            const roleHint = document.getElementById('roleHint');

            if (role === 'staff') {
                tabStaff.classList.add('active');
                tabHod.classList.remove('active');
                roleHint.textContent = 'You are logging in as Staff.';
            } else {
                tabHod.classList.add('active');
                tabStaff.classList.remove('active');
                roleHint.textContent = 'You are logging in as Head of Department (HOD).';
            }
        }

        // Form Submission
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role: currentRole })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    sessionStorage.setItem('auth_token', 'temp_token_123'); // Still use some token
                    sessionStorage.setItem('user_role', data.user.role || currentRole);
                    sessionStorage.setItem('user_name', data.user.username);
                    
                    const toast = document.getElementById('toast');
                    document.getElementById('toastMsg').textContent = 'Login successful! Redirecting...';
                    document.getElementById('toastIcon').className = 'fa-solid fa-check-circle text-green-500';
                    toast.className = 'fixed bottom-6 right-6 transform transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-xl shadow-lg font-medium bg-white dark:bg-dark-card border border-gray-100 dark:border-gray-800 toast-visible';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    document.getElementById('toastMsg').textContent = data.error || 'Login failed';
                    document.getElementById('toastIcon').className = 'fa-solid fa-circle-exclamation text-red-500';
                    const toast = document.getElementById('toast');
                    toast.className = 'fixed bottom-6 right-6 transform transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-xl shadow-lg font-medium bg-white dark:bg-dark-card border border-gray-100 dark:border-gray-800 toast-visible toast-error';
                    
                    setTimeout(() => {
                        toast.classList.remove('toast-visible');
                        toast.classList.add('opacity-0', 'translate-y-20');
                    }, 3000);

                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('toastMsg').textContent = 'Connection error. Is the server running?';
                document.getElementById('toastIcon').className = 'fa-solid fa-circle-exclamation text-red-500';
                const toast = document.getElementById('toast');
                toast.className = 'fixed bottom-6 right-6 transform transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-xl shadow-lg font-medium bg-white dark:bg-dark-card border border-gray-100 dark:border-gray-800 toast-visible toast-error';
                
                setTimeout(() => {
                    toast.classList.remove('toast-visible');
                    toast.classList.add('opacity-0', 'translate-y-20');
                }, 3000);

                btn.innerHTML = originalContent;
                btn.disabled = false;
            });
        });

        // Toggle Password Visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            
            // Check if already logged in
            if (sessionStorage.getItem('auth_token')) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
